name: Release

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check version
        id: tag
        run: |
          version=$(jq -r '.version' manifest.json)
          latest=$(git tag --sort=-v:refname | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
          if [ "$latest" = "$version" ]; then
            echo "Version $version is already released. Update manifest.json before releasing."
            exit 1
          fi
          echo "tag=$version" >> "$GITHUB_OUTPUT"

      - name: Download artifact from last build
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: build.yml
          name: WhereIsMyPSNA
          branch: main
          workflow_conclusion: success

      - name: Rename and compute SHA256
        id: sha
        run: |
          filename="com.odizinne.whereismypsna_${{ steps.tag.outputs.tag }}.bhm"
          mv WhereIsMyPSNA.bhm "$filename"
          sha=$(sha256sum "$filename" | awk '{print $1}')
          echo "sha256=$sha" >> "$GITHUB_OUTPUT"
          echo "filename=$filename" >> "$GITHUB_OUTPUT"

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: v${{ steps.tag.outputs.tag }}
          draft: true
          files: ${{ steps.sha.outputs.filename }}
          body: |
            **SHA256:** `${{ steps.sha.outputs.sha256 }}`
