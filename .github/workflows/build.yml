name: Build

on:
  push:
    branches: ["**"]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Build
        run: dotnet build --configuration Release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: WhereIsMyPSNA
          path: WhereIsMyPSNA.bhm
          retention-days: 30
